name: Daily Bot

on:
  schedule:
    # UTC 18:17（北京时间 02:17），预计延迟后在北京时间早上 6 点左右收到
    - cron: '17 18 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache SQLite data for trend persistence
        uses: actions/cache@v4
        with:
          path: data/
          key: bot-data-${{ github.run_id }}
          restore-keys: bot-data-

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Configure environment
        run: |
          cat > .env << 'EOF'
          AI_API_BASE=${{ secrets.AI_API_BASE }}
          AI_API_KEY=${{ secrets.AI_API_KEY }}
          AI_MODEL=${{ secrets.AI_MODEL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USERNAME=${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT=${{ secrets.EMAIL_RECIPIENT }}
          GITHUB_TOKEN=${{ github.token }}
          PRODUCT_HUNT_TOKEN=${{ secrets.PRODUCT_HUNT_TOKEN }}
          EOF

      - name: Run bot
        run: python -m src.main --once --task "🧭 AI 技术雷达日报"

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
