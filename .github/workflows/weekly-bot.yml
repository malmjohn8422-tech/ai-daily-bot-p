name: Weekly Bot

on:
  schedule:
    # UTC 周六 21:50（北京时间周日 05:50），正常情况下接近北京时间周日早上 6 点收到
    - cron: '50 21 * * 6'
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache SQLite data for trend persistence
        uses: actions/cache@v4
        with:
          path: data/
          key: bot-data-${{ github.run_id }}
          restore-keys: bot-data-

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Configure environment
        run: |
          cat > .env << 'EOF'
          AI_API_BASE=${{ secrets.AI_API_BASE }}
          AI_API_KEY=${{ secrets.AI_API_KEY }}
          AI_MODEL=${{ secrets.AI_MODEL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USERNAME=${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT=${{ secrets.EMAIL_RECIPIENT }}
          GITHUB_TOKEN=${{ github.token }}
          PRODUCT_HUNT_TOKEN=${{ secrets.PRODUCT_HUNT_TOKEN }}
          EOF

      - name: Run weekly bot
        run: python -m src.main --once --task "📊 AI 技术雷达周报"

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
